name: Verify M4 nested Safe authority

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: m4-nested-safe-authority-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Reconstruct and validate nested Safe audit
        shell: bash
        run: |
          runtime_path=.github/scripts/.runtime-audit-m4-nested-safe-authority.mjs
          v2_patcher=/tmp/patch-m4-safe-authority-v2.py
          git show a6bc9db4a370b3a4dfb07db1ab704d7e9c551fce:.github/scripts/audit-m4-safe-authority.mjs > "$runtime_path"
          git show 612e317a190728cd4e1b1138a3d5c5f67bef9d55:.github/scripts/patch-m4-safe-authority-v2.py > "$v2_patcher"
          python "$v2_patcher" "$runtime_path"
          python .github/scripts/patch-m4-nested-safe-authority.py "$runtime_path"
          node --check "$runtime_path"

  verify:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    env:
      CONFIGURED_ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Reconstruct nested Safe audit
        shell: bash
        run: |
          runtime_path=.github/scripts/.runtime-audit-m4-nested-safe-authority.mjs
          v2_patcher=/tmp/patch-m4-safe-authority-v2.py
          git show a6bc9db4a370b3a4dfb07db1ab704d7e9c551fce:.github/scripts/audit-m4-safe-authority.mjs > "$runtime_path"
          git show 612e317a190728cd4e1b1138a3d5c5f67bef9d55:.github/scripts/patch-m4-safe-authority-v2.py > "$v2_patcher"
          python "$v2_patcher" "$runtime_path"
          python .github/scripts/patch-m4-nested-safe-authority.py "$runtime_path"
          node --check "$runtime_path"
      - name: Audit nested Safe authority configuration
        id: audit
        shell: bash
        run: node .github/scripts/.runtime-audit-m4-nested-safe-authority.mjs | tee nested-safe-authority-audit.json
      - name: Upload complete normalized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-nested-safe-authority-audit-${{ github.run_id }}
          path: nested-safe-authority-audit.json
          if-no-files-found: error
          retention-days: 30
      - name: Post compact evidence marker
        if: always()
        uses: actions/github-script@v7
        env:
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        with:
          script: |
            const fs = require('fs')
            let result = null
            try {
              result = JSON.parse(fs.readFileSync('nested-safe-authority-audit.json', 'utf8'))
            } catch {}

            const safe = result?.safes?.find((entry) => entry.issueNumber === 99) ?? null
            const state = safe?.state ?? null
            const evidence = new Map(
              (safe?.relatedEvidence ?? []).map((entry) => [entry.address, entry]),
            )
            const ownerLines = state?.owners?.length
              ? state.owners.map(
                  (owner) => `- \`${owner}\`: ${evidence.get(owner)?.classification ?? 'unresolved'}`,
                )
              : ['- unavailable']
            const moduleLines = state?.modules?.modules?.length
              ? state.modules.modules.map(
                  (module) => `- \`${module}\`: ${evidence.get(module)?.classification ?? 'unresolved'}`,
                )
              : ['- none']

            const lines = [
              '<!-- m4-nested-safe-authority-audit -->',
              `M4 nested Safe authority audit run \`${context.runId}\``,
              `- event: \`${context.eventName}\``,
              `- audit step: \`${process.env.AUDIT_OUTCOME}\``,
              `- commit: \`${context.sha}\``,
              `- artifact: \`m4-nested-safe-authority-audit-${context.runId}\``,
              '',
              safe ? `- Safe: \`${safe.address}\`` : '- Safe: result-unavailable',
              safe ? `- status: \`${safe.status}\`` : '- status: `result-unavailable`',
              safe ? `- control status: \`${safe.controlStatus}\`` : '- control status: `unresolved`',
              result
                ? `- confirmed end block: \`${result.endBoundary.blockNumber}\` (agreement: \`${result.endBoundary.agreement}\`)`
                : '- confirmed end block: unavailable',
              safe
                ? `- deployment block: \`${safe.deploymentBoundary.blockNumber}\` (agreement: \`${safe.deploymentBoundary.agreement}\`)`
                : '- deployment block: unavailable',
              result
                ? `- singleton agreement: \`${result.implementationAgreement}\`; singleton: \`${result.expectedSingleton}\``
                : '- singleton agreement: unavailable',
              safe ? `- provider state agreement: \`${safe.providerAgreement}\`` : '- provider state agreement: unavailable',
              state ? `- version: \`${state.version ?? 'unsupported'}\`` : '- version: unavailable',
              state
                ? `- owners: \`${state.owners.length}\`; threshold: \`${state.threshold}\`; nonce: \`${state.nonce}\``
                : '- owners/threshold/nonce: unavailable',
              state
                ? `- modules: \`${state.modules.modules.length}\`; pages: \`${state.modules.pages}\``
                : '- modules: unavailable',
              state ? `- guard: \`${state.guard ?? 'none'}\`` : '- guard: unavailable',
              state
                ? `- fallback handler: \`${state.fallbackHandler ?? 'none'}\`; canonical: \`${safe?.canonicalFallbackHandler ?? false}\``
                : '- fallback handler: unavailable',
              safe
                ? `- validation: \`${safe.validation.valid}\`; reasons: \`${JSON.stringify(safe.validation.reasons)}\``
                : '- validation: unavailable',
              '',
              'Owners:',
              ...ownerLines,
              '',
              'Enabled modules:',
              ...moduleLines,
              '',
              safe
                ? `Authority boundaries: \`${JSON.stringify(safe.authorityBoundaries)}\``
                : 'Authority boundaries: `unresolved`',
              '',
              'Execution eligibility remains `false`. Alchemy is mandatory for deployment archive and shared-block current-state agreement. Provider endpoints and credentials are omitted; no Safe transaction hash, calldata, signature, or state-changing operation was produced.',
            ]

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 99,
              body: lines.join('\n'),
            })
