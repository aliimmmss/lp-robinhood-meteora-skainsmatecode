name: M4 Review Lifecycle Hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Pin report metadata and complete check sets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          path = Path('packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.ts')
          text = path.read_text()
          text = text.replace(
              "import { getAddress, keccak256, stringToHex, type Address, type Hex } from 'viem'",
              "import { getAddress, keccak256, stringToHex, zeroAddress, type Address, type Hex } from 'viem'",
              1,
          )
          text = text.replace(
              "import { ROBINHOOD_CHAIN_ID, ROBINHOOD_UNISWAP_V3 } from './registry.js'",
              "import { ROBINHOOD_CHAIN_ID, ROBINHOOD_UNISWAP_V3 } from './registry.js'\nimport {\n  WETH_ALLOWANCE_SIMULATION_FIXTURE_VERSION,\n  WETH_ALLOWANCE_SIMULATION_SOURCE_FORMAT,\n} from './weth-allowance-simulation-ingestion.js'\nimport { WETH_ALLOWANCE_SIMULATION_POLICY_VERSION } from './weth-allowance-simulation-policy.js'",
              1,
          )
          text = text.replace(
              "import { ROBINHOOD_WETH_PROXY_EVIDENCE } from './weth-proxy-evidence.js'",
              "import { ROBINHOOD_WETH_AUTHORITY_EVIDENCE } from './weth-authority-evidence.js'\nimport { ROBINHOOD_WETH_PROXY_EVIDENCE } from './weth-proxy-evidence.js'",
              1,
          )
          text = text.replace(
              "  const reportChecksValid = reportRecord !== null && validateReportChecks(reportRecord.checks)\n",
              "  const reportChecksValid = reportRecord !== null && validateReportChecks(reportRecord.checks)\n  const reportMetadataValid =\n    reportRecord !== null &&\n    isHex32(reportRecord.ingestionReviewDigest) &&\n    isHex32(reportRecord.policyEvidenceDigest) &&\n    reportRecord.fixtureVersion === WETH_ALLOWANCE_SIMULATION_FIXTURE_VERSION &&\n    reportRecord.sourceFormat === WETH_ALLOWANCE_SIMULATION_SOURCE_FORMAT &&\n    reportRecord.policyVersion === WETH_ALLOWANCE_SIMULATION_POLICY_VERSION\n",
              1,
          )
          metadata_check = dedent("""
              lifecycleCheck(
                'report-metadata',
                reportMetadataValid,
                'Review report metadata is pinned and complete.',
                'Review report metadata is missing, malformed, or unpinned.',
              ),
          """).lstrip('\n')
          integrity_marker = "    lifecycleCheck(\n      'report-integrity',\n"
          if "'report-metadata'" not in text:
              if integrity_marker not in text:
                  raise SystemExit('report-integrity marker not found')
              text = text.replace(integrity_marker, metadata_check + integrity_marker, 1)
          text = text.replace(
              "    evidence.operation === WETH_ALLOWANCE_REVOCATION_OPERATION &&\n    evidence.chainId === ROBINHOOD_CHAIN_ID &&",
              "    evidence.operation === WETH_ALLOWANCE_REVOCATION_OPERATION &&\n    evidence.chainId === ROBINHOOD_CHAIN_ID &&\n    evidence.owner !== zeroAddress &&",
              1,
          )
          text = text.replace(
              "    evidence.registryVerified &&\n    evidence.authoritySourceAgreement &&",
              "    evidence.registryVerified &&\n    evidence.authorityStatus === ROBINHOOD_WETH_AUTHORITY_EVIDENCE.status &&\n    evidence.authoritySourceAgreement &&",
              1,
          )
          start = text.index('function validateReportChecks(value: unknown): boolean {')
          end = text.index('\nfunction verifyReportDigest', start)
          replacement = dedent("""
              function validateReportChecks(value: unknown): boolean {
                if (!Array.isArray(value) || value.length === 0) return false

                const observed = {
                  renderer: new Set<string>(),
                  ingestion: new Set<string>(),
                  policy: new Set<string>(),
                }

                for (const item of value) {
                  if (!isRecord(item) || !hasExactKeys(item, ['source', 'code', 'status', 'message'])) return false
                  if (item.status !== 'pass' || typeof item.message !== 'string' || typeof item.code !== 'string') return false

                  if (item.source === 'renderer') {
                    if (!REVIEWED_RENDERER_CHECK_CODES.has(item.code) || observed.renderer.has(item.code)) return false
                    observed.renderer.add(item.code)
                    continue
                  }
                  if (item.source === 'ingestion') {
                    if (!REVIEWED_INGESTION_CHECK_CODES.has(item.code) || observed.ingestion.has(item.code)) return false
                    observed.ingestion.add(item.code)
                    continue
                  }
                  if (item.source === 'policy') {
                    if (!REVIEWED_POLICY_CHECK_CODES.has(item.code) || observed.policy.has(item.code)) return false
                    observed.policy.add(item.code)
                    continue
                  }
                  return false
                }

                return (
                  setsEqual(observed.renderer, REVIEWED_RENDERER_CHECK_CODES) &&
                  setsEqual(observed.ingestion, REVIEWED_INGESTION_CHECK_CODES) &&
                  setsEqual(observed.policy, REVIEWED_POLICY_CHECK_CODES)
                )
              }

              function setsEqual(left: ReadonlySet<string>, right: ReadonlySet<string>): boolean {
                return left.size === right.size && [...left].every((value) => right.has(value))
              }
          """).strip('\n')
          text = text[:start] + replacement + text[end:]
          path.write_text(text)

          test_path = Path('packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.test.ts')
          test = test_path.read_text()
          digest_line = "      ['report-digest', { ...report, reportDigest: 'not-a-digest' }],\n"
          metadata_line = "      ['report-metadata', { ...report, fixtureVersion: 'forged-version' }],\n"
          if metadata_line not in test:
              if digest_line not in test:
                  raise SystemExit('report-digest test marker not found')
              test = test.replace(digest_line, digest_line + metadata_line, 1)
          unknown_line = "      ['report-checks', { ...report, checks: [{ source: 'renderer', code: 'unknown', status: 'pass', message: 'x' }] }],\n"
          subset_line = "      ['report-checks', { ...report, checks: [report.checks[0]!] }],\n"
          if subset_line not in test:
              if unknown_line not in test:
                  raise SystemExit('report-checks test marker not found')
              test = test.replace(unknown_line, unknown_line + subset_line, 1)
          test_path.write_text(test)
          PY
          npx prettier --write \
            packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.ts \
            packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.test.ts
          npm run lint
          npm run typecheck
          npm test
      - name: Commit hardening changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.ts packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Harden offline review lifecycle validation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
