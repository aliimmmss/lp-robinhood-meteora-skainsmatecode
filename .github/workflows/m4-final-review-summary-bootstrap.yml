name: M4 Final Review Summary Bootstrap

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Export, format, and validate final review summary
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/robinhood-univ3/src/index.ts')
          source = path.read_text()
          marker = """export type {
            WethAllowanceRevocationReviewConfirmationLifecycleCheck,
            WethAllowanceRevocationReviewConfirmationLifecycleInput,
            WethAllowanceRevocationReviewConfirmationLifecycleResult,
          } from './weth-allowance-revocation-review-confirmation-lifecycle.js'
          """
          addition = marker + """export {
            POSITION_MANAGER_DISPLAY_LABEL,
            ROBINHOOD_CHAIN_DISPLAY_NAME,
            WETH_ALLOWANCE_REVOCATION_FINAL_REVIEW_SUMMARY_VERSION,
            WETH_DECIMALS,
            WETH_DISPLAY_LABEL,
            WETH_PROXY_DISPLAY_LABEL,
            createWethAllowanceRevocationFinalReviewSummary,
            digestWethAllowanceRevocationFinalReviewSummaryBody,
            renderWethAllowanceRevocationFinalReviewSummary,
          } from './weth-allowance-revocation-final-review-summary.js'
          export type {
            WethAllowanceRevocationFinalReviewSummary,
            WethAllowanceRevocationFinalReviewSummaryBody,
            WethAllowanceRevocationFinalReviewSummaryCheck,
            WethAllowanceRevocationFinalReviewSummaryInput,
            WethAllowanceRevocationFinalReviewSummaryLifecycleReference,
            WethAllowanceRevocationFinalReviewSummaryResult,
          } from './weth-allowance-revocation-final-review-summary.js'
          """
          if 'createWethAllowanceRevocationFinalReviewSummary' not in source:
              if marker not in source:
                  raise SystemExit('confirmation lifecycle export marker not found')
              source = source.replace(marker, addition, 1)
          path.write_text(source)
          PY
          npx prettier --write \
            packages/robinhood-univ3/src/index.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-final-review-summary.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-final-review-summary.test.ts
          npm run lint
          npm run typecheck
          npm test
      - name: Commit validated source
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            packages/robinhood-univ3/src/index.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-final-review-summary.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-final-review-summary.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format and export offline final review summary"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
