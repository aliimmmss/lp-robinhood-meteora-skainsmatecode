name: Run M4 AccessControl audit v4 patcher

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v4

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Patch, format, and lint audit script
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/patch-weth-access-control-v4.py
          npm run format
          npm run lint
      - name: Commit patched script
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/scripts/patch-weth-access-control-v4.py
          rm -f .github/scripts/.m4-v4-trigger
          git add --all
          git commit -m "fix: verify AccessControl history through Blockscout"
          git push origin HEAD:agent/m4-access-control-history-audit-v4
