name: Fix M4 AccessControl audit v2 scan summary

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v2

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Replace unused event destructuring
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/scripts/audit-weth-access-control.mjs')
          content = path.read_text()
          old = """    scans: scans.map(({ events: _events, ...scan }) => scan),"""
          new = """    scans: scans.map((scan) => ({
      label: scan.label,
      endpoint: scan.endpoint,
      status: scan.status,
      startBlock: scan.startBlock,
      endBlock: scan.endBlock,
      rawLogCount: scan.rawLogCount ?? null,
      eventCount: scan.eventCount ?? 0,
      eventDigest: scan.eventDigest ?? null,
      error: scan.error ?? null,
    })),"""
          if old not in content:
              raise SystemExit('expected scan projection not found')
          path.write_text(content.replace(old, new))
          PY
      - run: npm run format
      - run: npm run lint
      - name: Commit clean lint correction
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "fix: summarize AccessControl scans without unused binding"
          git push origin HEAD:agent/m4-access-control-history-audit-v2
