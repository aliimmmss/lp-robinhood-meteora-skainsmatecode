name: M4 Review Lifecycle Bootstrap

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply package exports and formatting
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lifecycle = Path('packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.ts')
          text = lifecycle.read_text().replace(
              "  type WethAllowanceSimulationReviewReport,\n",
              "",
          )
          lifecycle.write_text(text)

          index = Path('packages/robinhood-univ3/src/index.ts')
          text = index.read_text()
          marker = """export type {
            WethAllowanceSimulationReviewCall,
            WethAllowanceSimulationReviewEvent,
            WethAllowanceSimulationReviewEvidence,
            WethAllowanceSimulationReviewReport,
            WethAllowanceSimulationReviewReportCheck,
          } from './weth-allowance-simulation-review-report.js'
          """
          addition = """export {
            WETH_ALLOWANCE_SIMULATION_REVIEW_LIFECYCLE_VERSION,
            evaluateWethAllowanceSimulationReviewLifecycle,
          } from './weth-allowance-simulation-review-lifecycle.js'
          export type {
            WethAllowanceSimulationReviewCurrentState,
            WethAllowanceSimulationReviewLifecycleCheck,
            WethAllowanceSimulationReviewLifecycleResult,
          } from './weth-allowance-simulation-review-lifecycle.js'
          """
          if addition not in text:
              text = text.replace(marker, marker + addition)
          index.write_text(text)
          PY
          npx prettier --write \
            packages/robinhood-univ3/src/index.ts \
            packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.ts \
            packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.test.ts
      - name: Commit bootstrap changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/robinhood-univ3/src/index.ts packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.ts packages/robinhood-univ3/src/weth-allowance-simulation-review-lifecycle.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format and export offline review lifecycle"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
