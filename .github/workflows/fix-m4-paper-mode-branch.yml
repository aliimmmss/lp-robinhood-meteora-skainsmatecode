name: Fix M4 paper-mode branch

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-weth-allowance-paper-mode
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply repository formatting
        run: |
          npx prettier --write \
            apps/worker/package.json \
            apps/worker/src/weth-allowance-paper.ts \
            apps/worker/src/weth-allowance-paper.test.ts \
            docs/M4_WETH_ALLOWANCE_PAPER_MODE.md \
            packages/robinhood-univ3/src/index.ts \
            packages/robinhood-univ3/src/weth-allowance-paper.ts \
            packages/robinhood-univ3/src/weth-allowance-paper.test.ts
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            apps/worker/package.json \
            apps/worker/src/weth-allowance-paper.ts \
            apps/worker/src/weth-allowance-paper.test.ts \
            docs/M4_WETH_ALLOWANCE_PAPER_MODE.md \
            packages/robinhood-univ3/src/index.ts \
            packages/robinhood-univ3/src/weth-allowance-paper.ts \
            packages/robinhood-univ3/src/weth-allowance-paper.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format M4 paper mode"
          git push origin HEAD:agent/m4-weth-allowance-paper-mode
