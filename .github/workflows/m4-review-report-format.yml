name: M4 Review Report Format

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prettier --write packages/robinhood-univ3/src/weth-allowance-simulation-review-report.ts packages/robinhood-univ3/src/weth-allowance-simulation-review-report.test.ts
      - name: Commit formatted source
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/robinhood-univ3/src/weth-allowance-simulation-review-report.ts packages/robinhood-univ3/src/weth-allowance-simulation-review-report.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format offline simulation review report"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
