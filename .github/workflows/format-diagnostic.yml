name: Format Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture Prettier patch
        run: |
          npx prettier --write .
          git diff -- . ':!.github/workflows/format-diagnostic.yml' > prettier.patch
          git diff --name-only -- . ':!.github/workflows/format-diagnostic.yml' > prettier-files.txt
      - uses: actions/upload-artifact@v4
        with:
          name: prettier-diagnostic
          path: |
            prettier.patch
            prettier-files.txt
