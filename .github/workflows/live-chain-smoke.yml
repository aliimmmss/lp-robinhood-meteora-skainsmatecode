name: Live Chain Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/robinhood-univ3/**'
      - '.github/workflows/live-chain-smoke.yml'

permissions:
  contents: read

jobs:
  robinhood-univ3:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Render pinned formatting
        run: npx prettier --write packages/robinhood-univ3/src/live-smoke.ts .github/workflows/live-chain-smoke.yml
      - name: Build diagnostic command
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build-output.txt 2>&1
          status=$?
          cat build-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Probe public RPC and canonical contracts
        if: steps.build.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          npm --workspace @lp-mine/robinhood-univ3 run smoke:live > live-smoke.json 2> live-smoke-error.txt
          status=$?
          cat live-smoke.json || true
          cat live-smoke-error.txt >&2 || true
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
        id: smoke
      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robinhood-live-smoke
          path: |
            build-output.txt
            live-smoke.json
            live-smoke-error.txt
            packages/robinhood-univ3/src/live-smoke.ts
            .github/workflows/live-chain-smoke.yml
      - name: Report build failure
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
      - name: Report smoke failure
        if: steps.build.outputs.exit_code == '0' && steps.smoke.outputs.exit_code != '0'
        run: exit 1
