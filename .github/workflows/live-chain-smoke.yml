name: Live Chain Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/robinhood-univ3/**'
      - '.github/workflows/live-chain-smoke.yml'

permissions:
  contents: read

jobs:
  robinhood-univ3:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build diagnostic command
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build-output.txt 2>&1
          status=$?
          cat build-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Probe configured RPC and canonical contracts
        if: steps.build.outputs.exit_code == '0'
        id: smoke
        shell: bash
        env:
          ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL }}
        run: |
          set +e
          if [ -z "$ROBINHOOD_RPC_URL" ]; then
            echo "ROBINHOOD_RPC_URL repository secret is not configured" > live-smoke-error.txt
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm --workspace @lp-mine/robinhood-univ3 run smoke:live > live-smoke.json 2> live-smoke-error.raw.txt
          status=$?

          node - <<'NODE'
          const fs = require('node:fs')
          const secret = process.env.ROBINHOOD_RPC_URL ?? ''
          const input = fs.existsSync('live-smoke-error.raw.txt')
            ? fs.readFileSync('live-smoke-error.raw.txt', 'utf8')
            : ''
          fs.writeFileSync('live-smoke-error.txt', secret ? input.split(secret).join('[REDACTED_RPC_URL]') : input)
          NODE
          rm -f live-smoke-error.raw.txt

          cat live-smoke.json || true
          cat live-smoke-error.txt >&2 || true
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robinhood-live-smoke
          path: |
            build-output.txt
            live-smoke.json
            live-smoke-error.txt
      - name: Report build failure
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
      - name: Report smoke failure
        if: steps.build.outputs.exit_code == '0' && steps.smoke.outputs.exit_code != '0'
        run: exit 1
