name: Telegram monitor
# Temporary second-pass trigger; remove after deduplication verification.

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read
  issues: write

concurrency:
  group: telegram-monitor
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LP_MINE_DATABASE_PATH: ./data/robinhood-univ3.sqlite
      LP_MINE_EXPECTED_INTERVAL_SECONDS: '3600'
      LP_MINE_MAXIMUM_OBSERVATION_AGE_SECONDS: '5400'
      ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL }}
      LP_MINE_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      LP_MINE_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
      LP_MINE_TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID || vars.TELEGRAM_MESSAGE_THREAD_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore monitoring state
        id: restore-monitor-db
        uses: actions/cache/restore@v4
        with:
          path: |
            data/robinhood-univ3.sqlite
            data/robinhood-univ3.sqlite-wal
            data/robinhood-univ3.sqlite-shm
          key: monitor-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            monitor-db-${{ runner.os }}-
      - run: mkdir -p data
      - run: npm run build
      - name: Capture current canonical-pool observations
        run: npm run --workspace @lp-mine/worker pools:observe
      - name: Deliver new Telegram alerts
        id: notify
        shell: bash
        run: |
          set -o pipefail
          node --enable-source-maps apps/worker/dist/monitor-telegram-notify.js | tee telegram-result.json
      - name: Save monitoring state
        if: always() && hashFiles('data/robinhood-univ3.sqlite') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            data/robinhood-univ3.sqlite
            data/robinhood-univ3.sqlite-wal
            data/robinhood-univ3.sqlite-shm
          key: ${{ steps.restore-monitor-db.outputs.cache-primary-key }}
      - name: Post temporary operational verification marker
        if: always()
        uses: actions/github-script@v7
        env:
          NOTIFY_OUTCOME: ${{ steps.notify.outcome }}
          CACHE_HIT: ${{ steps.restore-monitor-db.outputs.cache-hit }}
        with:
          script: |
            const fs = require('fs')
            let result = null
            try {
              result = JSON.parse(fs.readFileSync('telegram-result.json', 'utf8'))
            } catch {}
            const safeResult = result === null
              ? null
              : {
                  status: result.status,
                  healthStatus: result.healthStatus,
                  candidateAlertCount: result.candidateAlertCount,
                  deliveredAlertCount: result.deliveredAlertCount,
                  messageCount: result.messageCount,
                }
            const body = [
              '<!-- telegram-monitor-operational-verification -->',
              `Telegram monitor verification run \`${context.runId}\``,
              '',
              `- event: \`${context.eventName}\``,
              `- notify step: \`${process.env.NOTIFY_OUTCOME || 'unknown'}\``,
              `- exact cache hit: \`${process.env.CACHE_HIT || 'false'}\``,
              `- commit: \`${context.sha}\``,
              '',
              'Sanitized notification result:',
              '```json',
              JSON.stringify(safeResult, null, 2),
              '```',
              '',
              'Temporary verification marker; contains no Telegram token, chat ID, wallet data, or signing authority.',
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 32,
              body,
            })
