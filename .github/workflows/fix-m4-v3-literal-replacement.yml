name: Fix M4 v3 literal replacement

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v3b

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v3b
      - name: Insert transport text literally
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/patch-m4-access-control-v3.yml')
          content = path.read_text()
          old = '          content, count = re.subn(pattern, transport, content, count=1, flags=re.S)\n'
          new = '          content, count = re.subn(pattern, lambda _match: transport, content, count=1, flags=re.S)\n'
          if old not in content:
              raise SystemExit('literal replacement target not found')
          path.write_text(content.replace(old, new, 1))
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/workflows/fix-m4-v3-literal-replacement.yml
          git add --all
          git commit -m "fix: insert v3 transport text literally"
          git push origin HEAD:agent/m4-access-control-history-audit-v3b
