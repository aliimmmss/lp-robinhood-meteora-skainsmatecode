name: Verify M4 Safe authority v2

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: m4-safe-authority-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Reconstruct and validate patched audit
        shell: bash
        run: |
          runtime_path=.github/scripts/.runtime-audit-m4-safe-authority-v2.mjs
          git show a6bc9db4a370b3a4dfb07db1ab704d7e9c551fce:.github/scripts/audit-m4-safe-authority.mjs > "$runtime_path"
          python .github/scripts/patch-m4-safe-authority-v2.py "$runtime_path"
          node --check "$runtime_path"

  verify:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    env:
      CONFIGURED_ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Reconstruct patched Safe audit
        shell: bash
        run: |
          runtime_path=.github/scripts/.runtime-audit-m4-safe-authority-v2.mjs
          git show a6bc9db4a370b3a4dfb07db1ab704d7e9c551fce:.github/scripts/audit-m4-safe-authority.mjs > "$runtime_path"
          python .github/scripts/patch-m4-safe-authority-v2.py "$runtime_path"
          node --check "$runtime_path"
      - name: Audit both Safe authority configurations
        id: audit
        shell: bash
        run: node .github/scripts/.runtime-audit-m4-safe-authority-v2.mjs | tee safe-authority-audit-v2.json
      - name: Upload complete normalized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-safe-authority-audit-v2-${{ github.run_id }}
          path: safe-authority-audit-v2.json
          if-no-files-found: error
          retention-days: 30
      - name: Post compact evidence markers
        if: always()
        uses: actions/github-script@v7
        env:
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        with:
          script: |
            const fs = require('fs')
            let result = null
            try {
              result = JSON.parse(fs.readFileSync('safe-authority-audit-v2.json', 'utf8'))
            } catch {}

            for (const issueNumber of [90, 93]) {
              const safe = result?.safes?.find((entry) => entry.issueNumber === issueNumber) ?? null
              const state = safe?.state ?? null
              const evidence = new Map(
                (safe?.relatedEvidence ?? []).map((entry) => [entry.address, entry]),
              )
              const ownerLines = state?.owners?.length
                ? state.owners.map(
                    (owner) => `- \`${owner}\`: ${evidence.get(owner)?.classification ?? 'unresolved'}`,
                  )
                : ['- unavailable']
              const moduleLines = state?.modules?.modules?.length
                ? state.modules.modules.map(
                    (module) => `- \`${module}\`: ${evidence.get(module)?.classification ?? 'unresolved'}`,
                  )
                : ['- none']

              const lines = [
                '<!-- m4-safe-authority-audit-v2 -->',
                `M4 Safe authority audit v2 run \`${context.runId}\``,
                `- event: \`${context.eventName}\``,
                `- audit step: \`${process.env.AUDIT_OUTCOME}\``,
                `- commit: \`${context.sha}\``,
                `- artifact: \`m4-safe-authority-audit-v2-${context.runId}\``,
                '',
                safe ? `- Safe: \`${safe.address}\` (${safe.label})` : '- Safe: result-unavailable',
                safe ? `- status: \`${safe.status}\`` : '- status: `result-unavailable`',
                safe ? `- control status: \`${safe.controlStatus}\`` : '- control status: `unresolved`',
                result
                  ? `- confirmed end block: \`${result.endBoundary.blockNumber}\` (agreement: \`${result.endBoundary.agreement}\`)`
                  : '- confirmed end block: unavailable',
                safe
                  ? `- deployment block: \`${safe.deploymentBoundary.blockNumber}\` (agreement: \`${safe.deploymentBoundary.agreement}\`)`
                  : '- deployment block: unavailable',
                result
                  ? `- singleton agreement: \`${result.implementationAgreement}\`; singleton: \`${result.expectedSingleton}\``
                  : '- singleton agreement: unavailable',
                result?.pinnedOfficialSafe
                  ? `- pinned Safe version: \`${result.pinnedOfficialSafe.version}\`; singleton hash: \`${result.pinnedOfficialSafe.singletonHash}\``
                  : '- pinned Safe provenance: unavailable',
                safe ? `- provider state agreement: \`${safe.providerAgreement}\`` : '- provider state agreement: unavailable',
                state ? `- version: \`${state.version ?? 'unsupported'}\`` : '- version: unavailable',
                state
                  ? `- owners: \`${state.owners.length}\`; threshold: \`${state.threshold}\`; nonce: \`${state.nonce}\``
                  : '- owners/threshold/nonce: unavailable',
                state
                  ? `- modules: \`${state.modules.modules.length}\`; pages: \`${state.modules.pages}\``
                  : '- modules: unavailable',
                state ? `- guard: \`${state.guard ?? 'none'}\`` : '- guard: unavailable',
                state
                  ? `- fallback handler: \`${state.fallbackHandler ?? 'none'}\``
                  : '- fallback handler: unavailable',
                safe
                  ? `- validation: \`${safe.validation.valid}\`; reasons: \`${JSON.stringify(safe.validation.reasons)}\``
                  : '- validation: unavailable',
                '',
                'Owners:',
                ...ownerLines,
                '',
                'Enabled modules:',
                ...moduleLines,
                '',
                safe
                  ? `Authority boundaries: \`${JSON.stringify(safe.authorityBoundaries)}\``
                  : 'Authority boundaries: `unresolved`',
                '',
                'Execution eligibility remains `false`. Alchemy is mandatory for deployment archive and shared-block current-state agreement. Provider endpoints and credentials are omitted; no Safe transaction hash, calldata, signature, or state-changing operation was produced.',
              ]

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: lines.join('\n'),
              })
            }

            const summaryLines = [
              '<!-- m4-safe-authority-audit-v2 -->',
              `M4 Safe authority audit v2 run \`${context.runId}\``,
              `- event: \`${context.eventName}\``,
              `- audit step: \`${process.env.AUDIT_OUTCOME}\``,
              `- commit: \`${context.sha}\``,
              `- artifact: \`m4-safe-authority-audit-v2-${context.runId}\``,
              '',
              result
                ? `- confirmed end block: \`${result.endBoundary.blockNumber}\` (agreement: \`${result.endBoundary.agreement}\`)`
                : '- confirmed end block: unavailable',
              result
                ? `- singleton agreement: \`${result.implementationAgreement}\`; singleton: \`${result.expectedSingleton}\``
                : '- singleton agreement: unavailable',
              ...(result?.safes ?? []).map(
                (safe) =>
                  `- ${safe.label} \`${safe.address}\`: status=\`${safe.status}\`, control=\`${safe.controlStatus}\`, providerAgreement=\`${safe.providerAgreement}\`, validation=\`${safe.validation.valid}\``,
              ),
              '',
              'Execution eligibility remains `false`. No Safe transaction hash, calldata, signature, submission, or state-changing operation was produced.',
            ]

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 96,
              body: summaryLines.join('\n'),
            })
