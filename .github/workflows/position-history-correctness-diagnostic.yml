name: Position History Correctness Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture formatting patch
        run: |
          npx prettier --write packages/core/src/position-history.ts packages/core/src/position-history.test.ts
          git diff -- . ':!.github/workflows/position-history-correctness-diagnostic.yml' > prettier.patch
      - uses: actions/upload-artifact@v4
        with:
          name: position-history-correctness-diagnostics
          path: prettier.patch
