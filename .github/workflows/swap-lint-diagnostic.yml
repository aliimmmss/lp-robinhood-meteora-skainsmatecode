name: Swap Lint Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture lint output
        run: npm run lint > lint.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: swap-lint-output
          path: lint.txt
