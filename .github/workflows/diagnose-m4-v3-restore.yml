name: Diagnose M4 v3 restore

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v3b

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v3b
          fetch-depth: 0
      - name: Capture restore step statuses
        shell: bash
        run: |
          set +e
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          report=.github/scripts/.m4-v3-restore-diagnostic
          : > "$report"
          git cat-file -e 5aa8d2c9b2318919750df801068d97614c6b9603^{commit}
          printf 'commit_lookup=%s\n' "$?" >> "$report"
          git checkout 5aa8d2c9b2318919750df801068d97614c6b9603 -- \
            .github/scripts/audit-weth-access-control.mjs \
            .github/workflows/verify-weth-access-control-history-v2.yml
          printf 'file_checkout=%s\n' "$?" >> "$report"
          test -f .github/scripts/audit-weth-access-control.mjs
          printf 'script_present=%s\n' "$?" >> "$report"
          test -f .github/workflows/verify-weth-access-control-history-v2.yml
          printf 'workflow_present=%s\n' "$?" >> "$report"
          cp .github/workflows/verify-weth-access-control-history-v2.yml /tmp/verify-v3.yml
          printf 'workflow_copy=%s\n' "$?" >> "$report"
          python - <<'PY'
          from pathlib import Path

          path = Path('/tmp/verify-v3.yml')
          content = path.read_text()
          content = content.replace('Verify WETH AccessControl history v2', 'Verify WETH AccessControl history v3')
          path.write_text(content)
          PY
          printf 'python_rewrite=%s\n' "$?" >> "$report"
          git reset --hard HEAD >/dev/null
          rm .github/workflows/diagnose-m4-v3-restore.yml
          git add "$report" .github/workflows/diagnose-m4-v3-restore.yml
          git commit -m "chore: capture v3 restore diagnostic"
          git push origin HEAD:agent/m4-access-control-history-audit-v3b
