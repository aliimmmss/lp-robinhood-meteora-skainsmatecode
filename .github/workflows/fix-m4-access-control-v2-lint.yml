name: Fix M4 AccessControl audit v2 lint

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v2

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Declare Node web globals for ESLint
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/scripts/audit-weth-access-control.mjs')
          content = path.read_text()
          directive = '/* global AbortSignal, fetch */\n'
          if directive not in content:
              path.write_text(directive + content)
          PY
      - run: npm run format
      - run: npm run lint
      - name: Commit lint correction
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "fix: declare AccessControl audit globals"
          git push origin HEAD:agent/m4-access-control-history-audit-v2
