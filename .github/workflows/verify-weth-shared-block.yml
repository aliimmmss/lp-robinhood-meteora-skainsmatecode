name: Verify WETH shared-block evidence

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

concurrency:
  group: weth-shared-block-verification
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CONFIGURED_ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify shared-block proxy state and administration
        id: audit
        shell: bash
        run: |
          set -o pipefail
          node --input-type=module <<'NODE' | tee weth-shared-block-audit.json
          import { createHash } from 'node:crypto'
          import { createPublicClient, getAddress, http, keccak256, parseAbi, zeroAddress } from 'viem'

          const CHAIN_ID = 4663
          const PUBLIC_RPC = 'https://rpc.mainnet.chain.robinhood.com'
          const WETH = getAddress('0x0Bd7D308f8E1639FAb988df18A8011f41EAcAD73')
          const POSITION_MANAGER = getAddress('0x73991a25C818Bf1f1128dEAaB1492D45638DE0D3')
          const IMPLEMENTATION_SLOT =
            '0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc'
          const ADMIN_SLOT =
            '0xb53127684a568b3173ae13b9f8a6016e243e63b6e8ee1178d6a717850b5d6103'
          const BEACON_SLOT =
            '0xa3f0ad74e5423aebfd80d3ef4346578335a9a72aeaee59ff6cb3582b35133d50'
          const TOKEN_ABI = parseAbi([
            'function name() view returns (string)',
            'function symbol() view returns (string)',
            'function decimals() view returns (uint8)',
            'function totalSupply() view returns (uint256)',
            'function allowance(address owner,address spender) view returns (uint256)',
          ])
          const OWNER_ABI = parseAbi(['function owner() view returns (address)'])

          function client(rpcUrl) {
            return createPublicClient({ transport: http(rpcUrl, { timeout: 15_000 }) })
          }

          function evidence(bytecode) {
            if (!bytecode || bytecode === '0x') {
              return { hasCode: false, byteLength: 0, bytecodeHash: null }
            }
            return {
              hasCode: true,
              byteLength: (bytecode.length - 2) / 2,
              bytecodeHash: keccak256(bytecode),
            }
          }

          function addressFromSlot(value) {
            if (!value || value === '0x' || /^0x0+$/.test(value)) return null
            const address = getAddress(`0x${value.slice(-40)}`)
            return address === zeroAddress ? null : address
          }

          async function latest(label, rpcUrl) {
            if (!rpcUrl) return { label, status: 'unavailable', error: 'provider-not-configured' }
            try {
              const rpc = client(rpcUrl)
              const [chainId, blockNumber] = await Promise.all([rpc.getChainId(), rpc.getBlockNumber()])
              return { label, status: chainId === CHAIN_ID ? 'available' : 'wrong-chain', chainId, blockNumber }
            } catch (error) {
              return {
                label,
                status: 'unavailable',
                error: error instanceof Error ? error.message.slice(0, 240) : String(error).slice(0, 240),
              }
            }
          }

          async function readOwner(rpc, admin, blockNumber) {
            if (!admin) return { address: null, status: 'not-applicable', code: null }
            try {
              const owner = getAddress(
                await rpc.readContract({ address: admin, abi: OWNER_ABI, functionName: 'owner', blockNumber }),
              )
              const ownerCode = await rpc.getBytecode({ address: owner, blockNumber })
              return { address: owner, status: 'read', code: evidence(ownerCode) }
            } catch (error) {
              return {
                address: null,
                status: 'unavailable',
                code: null,
                error: error instanceof Error ? error.message.slice(0, 240) : String(error).slice(0, 240),
              }
            }
          }

          async function probe(label, rpcUrl, blockNumber) {
            if (!rpcUrl) return { label, endpoint: 'omitted', status: 'unavailable' }
            const rpc = client(rpcUrl)
            try {
              const [chainId, proxyCode, implementationRaw, adminRaw, beaconRaw, name, symbol, decimals, totalSupply, allowance] =
                await Promise.all([
                  rpc.getChainId(),
                  rpc.getBytecode({ address: WETH, blockNumber }),
                  rpc.getStorageAt({ address: WETH, slot: IMPLEMENTATION_SLOT, blockNumber }),
                  rpc.getStorageAt({ address: WETH, slot: ADMIN_SLOT, blockNumber }),
                  rpc.getStorageAt({ address: WETH, slot: BEACON_SLOT, blockNumber }),
                  rpc.readContract({ address: WETH, abi: TOKEN_ABI, functionName: 'name', blockNumber }),
                  rpc.readContract({ address: WETH, abi: TOKEN_ABI, functionName: 'symbol', blockNumber }),
                  rpc.readContract({ address: WETH, abi: TOKEN_ABI, functionName: 'decimals', blockNumber }),
                  rpc.readContract({ address: WETH, abi: TOKEN_ABI, functionName: 'totalSupply', blockNumber }),
                  rpc.readContract({
                    address: WETH,
                    abi: TOKEN_ABI,
                    functionName: 'allowance',
                    args: [zeroAddress, POSITION_MANAGER],
                    blockNumber,
                  }),
                ])
              const implementation = addressFromSlot(implementationRaw)
              const admin = addressFromSlot(adminRaw)
              const beacon = addressFromSlot(beaconRaw)
              const [implementationCode, adminCode, beaconCode, owner] = await Promise.all([
                implementation ? rpc.getBytecode({ address: implementation, blockNumber }) : Promise.resolve(undefined),
                admin ? rpc.getBytecode({ address: admin, blockNumber }) : Promise.resolve(undefined),
                beacon ? rpc.getBytecode({ address: beacon, blockNumber }) : Promise.resolve(undefined),
                readOwner(rpc, admin, blockNumber),
              ])
              const proxy = evidence(proxyCode)
              const implementationEvidence = evidence(implementationCode)
              return {
                label,
                endpoint: 'omitted',
                status:
                  chainId === CHAIN_ID && proxy.hasCode && implementation && implementationEvidence.hasCode
                    ? 'verified'
                    : 'mismatch',
                chainId,
                blockNumber: blockNumber.toString(),
                slots: { implementation, admin, beacon },
                proxy,
                implementation: implementation ? { address: implementation, ...implementationEvidence } : null,
                admin: admin ? { address: admin, ...evidence(adminCode) } : null,
                beacon: beacon ? { address: beacon, ...evidence(beaconCode) } : null,
                owner,
                token: {
                  name,
                  symbol,
                  decimals,
                  totalSupply: totalSupply.toString(),
                  zeroOwnerAllowanceForPositionManager: allowance.toString(),
                },
              }
            } catch (error) {
              return {
                label,
                endpoint: 'omitted',
                status: 'unavailable',
                error: error instanceof Error ? error.message.slice(0, 300) : String(error).slice(0, 300),
              }
            }
          }

          async function fetchJson(url) {
            try {
              const response = await fetch(url, { signal: AbortSignal.timeout(15_000) })
              if (!response.ok) return { ok: false, status: response.status, value: null }
              return { ok: true, status: response.status, value: await response.json() }
            } catch (error) {
              return {
                ok: false,
                status: null,
                value: null,
                error: error instanceof Error ? error.message.slice(0, 200) : String(error).slice(0, 200),
              }
            }
          }

          function normalizedAbi(value) {
            if (Array.isArray(value)) return value
            if (typeof value !== 'string') return []
            try {
              const parsed = JSON.parse(value)
              return Array.isArray(parsed) ? parsed : []
            } catch {
              return []
            }
          }

          function sourceDigest(value) {
            if (!value || typeof value !== 'object') return { present: false, length: 0, sha256: null }
            const source = value.source_code
            if (source === null || source === undefined || source === '') {
              return { present: false, length: 0, sha256: null }
            }
            const serialized = typeof source === 'string' ? source : JSON.stringify(source)
            return {
              present: true,
              length: serialized.length,
              sha256: `0x${createHash('sha256').update(serialized).digest('hex')}`,
            }
          }

          function metadata(value) {
            if (!value || typeof value !== 'object') return null
            const abi = normalizedAbi(value.abi)
            return {
              name: value.name ?? null,
              isVerified: value.is_verified ?? null,
              isPartiallyVerified: value.is_partially_verified ?? null,
              compilerVersion: value.compiler_version ?? null,
              optimizationEnabled: value.optimization_enabled ?? null,
              optimizationRuns: value.optimization_runs ?? null,
              evmVersion: value.evm_version ?? null,
              licenseType: value.license_type ?? null,
              verifiedAt: value.verified_at ?? null,
              filePath: value.file_path ?? null,
              proxyType: value.proxy_type ?? null,
              implementations: value.implementations ?? null,
              source: sourceDigest(value),
              functions: abi
                .filter((entry) => entry?.type === 'function')
                .map((entry) => ({ name: entry.name, stateMutability: entry.stateMutability }))
                .sort((left, right) => `${left.name}:${left.stateMutability}`.localeCompare(`${right.name}:${right.stateMutability}`)),
              events: abi
                .filter((entry) => entry?.type === 'event')
                .map((entry) => entry.name)
                .sort(),
            }
          }

          const endpoints = [
            { label: 'official-public', url: PUBLIC_RPC },
            { label: 'configured-monitoring', url: process.env.CONFIGURED_ROBINHOOD_RPC_URL },
          ]
          const tips = await Promise.all(endpoints.map(({ label, url }) => latest(label, url)))
          const availableTips = tips.filter((tip) => tip.status === 'available')
          const sharedBlock = availableTips.reduce(
            (lowest, tip) => (tip.blockNumber < lowest ? tip.blockNumber : lowest),
            availableTips[0]?.blockNumber ?? 0n,
          )
          const sources =
            availableTips.length === 2 && sharedBlock > 0n
              ? await Promise.all(endpoints.map(({ label, url }) => probe(label, url, sharedBlock)))
              : tips
          const sourceAgreement =
            sources.length === 2 &&
            sources.every((source) => source.status === 'verified') &&
            JSON.stringify(sources[0]) === JSON.stringify({ ...sources[1], label: sources[0].label })

          const first = sources.find((source) => source.status === 'verified')
          const implementation = first?.slots?.implementation ?? null
          const admin = first?.slots?.admin ?? null
          const owner = first?.owner?.address ?? null
          const base = 'https://robinhoodchain.blockscout.com/api/v2'
          const [proxyContract, implementationContract, adminContract, ownerAddress] = await Promise.all([
            fetchJson(`${base}/smart-contracts/${WETH}`),
            implementation
              ? fetchJson(`${base}/smart-contracts/${implementation}`)
              : Promise.resolve({ ok: false, status: null, value: null }),
            admin
              ? fetchJson(`${base}/smart-contracts/${admin}`)
              : Promise.resolve({ ok: false, status: null, value: null }),
            owner
              ? fetchJson(`${base}/addresses/${owner}`)
              : Promise.resolve({ ok: false, status: null, value: null }),
          ])

          const result = {
            mode: 'read-only',
            generatedAt: new Date().toISOString(),
            sharedBlock: sharedBlock.toString(),
            tips: tips.map((tip) => ({
              label: tip.label,
              status: tip.status,
              chainId: tip.chainId ?? null,
              blockNumber: tip.blockNumber?.toString() ?? null,
              error: tip.error ?? null,
            })),
            sourceAgreement,
            sources,
            administration: {
              proxyType: 'eip1967-transparent',
              implementation,
              admin,
              adminOwner: owner,
              adminOwnerHasCode: first?.owner?.code?.hasCode ?? null,
              upgradeable: implementation !== null && admin !== null,
            },
            blockscout: {
              proxyRequestOk: proxyContract.ok,
              implementationRequestOk: implementationContract.ok,
              adminRequestOk: adminContract.ok,
              ownerAddressRequestOk: ownerAddress.ok,
              proxy: metadata(proxyContract.value),
              implementation: metadata(implementationContract.value),
              admin: metadata(adminContract.value),
              ownerAddress: ownerAddress.value
                ? {
                    isContract: ownerAddress.value.is_contract ?? null,
                    isVerified: ownerAddress.value.is_verified ?? null,
                    name: ownerAddress.value.name ?? null,
                  }
                : null,
            },
            overallStatus: sourceAgreement ? 'verified-shared-block' : 'blocked',
            executionEligible: false,
            disclaimer:
              'This audit reads one shared historical block and explorer metadata only. It does not call approve, encode calldata, connect a wallet, request a signature, submit a transaction, move funds, or recommend capital deployment.',
          }
          process.stdout.write(`${JSON.stringify(result, null, 2)}\n`)
          NODE
      - name: Post temporary shared-block evidence marker
        if: always()
        uses: actions/github-script@v7
        env:
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        with:
          script: |
            const fs = require('fs')
            let result = null
            try {
              result = JSON.parse(fs.readFileSync('weth-shared-block-audit.json', 'utf8'))
            } catch {}
            const body = [
              '<!-- weth-shared-block-audit -->',
              `WETH shared-block evidence run \`${context.runId}\``,
              `- event: \`${context.eventName}\``,
              `- audit step: \`${process.env.AUDIT_OUTCOME || 'unknown'}\``,
              `- commit: \`${context.sha}\``,
              '',
              '```json',
              JSON.stringify(result, null, 2),
              '```',
              '',
              'Temporary read-only marker; endpoints and credentials are omitted and no transaction-capable action was performed.',
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 62,
              body,
            })
