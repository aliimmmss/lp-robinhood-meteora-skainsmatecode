name: Observation Selection Formatter

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-and-clean:
    if: github.head_ref == 'feature/m2-observation-selection'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/m2-observation-selection
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply formatter and remove workflow
        run: |
          npx prettier --write packages/robinhood-univ3/src/observation-store.ts packages/robinhood-univ3/src/observation-store.test.ts packages/robinhood-univ3/src/index.ts apps/worker/src/position-history.ts apps/worker/src/position-performance.ts
          rm .github/workflows/observation-selection-formatter.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "style: format observation selection changes"
          git push
