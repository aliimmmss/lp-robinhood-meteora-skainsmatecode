name: M4 Review Report Type Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply explicit Hex annotation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/robinhood-univ3/src/weth-allowance-simulation-review-report.ts')
          text = path.read_text().replace(
              "const ZERO_DIGEST = `0x${'00'.repeat(32)}`",
              "const ZERO_DIGEST: Hex = `0x${'00'.repeat(32)}`",
              1,
          )
          path.write_text(text)
          PY
          npx prettier --write packages/robinhood-univ3/src/weth-allowance-simulation-review-report.ts
          npm run lint
          npm run typecheck
          npm test
      - name: Commit fixed source
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/robinhood-univ3/src/weth-allowance-simulation-review-report.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Type offline review report zero digest"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
