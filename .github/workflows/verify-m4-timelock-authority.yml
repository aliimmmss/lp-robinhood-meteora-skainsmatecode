name: Verify M4 timelock authority

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

concurrency:
  group: m4-timelock-authority
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CONFIGURED_ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit timelock roles and proxy controls
        id: audit
        shell: bash
        run: node .github/scripts/audit-m4-timelock-authority.mjs | tee timelock-authority-audit.json
      - name: Upload complete normalized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-timelock-authority-audit-${{ github.run_id }}
          path: timelock-authority-audit.json
          if-no-files-found: error
          retention-days: 30
      - name: Post compact evidence marker
        if: always()
        uses: actions/github-script@v7
        env:
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        with:
          script: |
            const fs = require('fs')
            let result = null
            try {
              result = JSON.parse(fs.readFileSync('timelock-authority-audit.json', 'utf8'))
            } catch {}

            const holderEvidence = new Map(
              (result?.holderEvidence ?? []).map((evidence) => [evidence.address, evidence]),
            )
            const holders = result?.roles?.currentHolders ?? []
            const holderLines = holders.length
              ? holders.map((holder) => {
                  const evidence = holderEvidence.get(holder.account)
                  return `- ${holder.roleLabel} \`${holder.account}\`: ${evidence?.classification ?? 'unresolved'}`
                })
              : ['- none reconstructed']

            const chain = result?.proxyAdminOwnership?.nodes ?? []
            const chainLines = chain.length
              ? chain.map(
                  (node) =>
                    `- depth ${node.depth}: \`${node.address}\` (${node.classification}); owner=\`${node.owner ?? 'unresolved'}\``,
                )
              : ['- unavailable']

            const scanLines = (result?.roleHistory?.scans ?? []).map((scan) => {
              const stats = scan.requestStats ?? {}
              return `- ${scan.label}: status=\`${scan.status}\`, requests=\`${stats.requests ?? 0}\`, pages=\`${stats.pages ?? 'n/a'}\`, blockHashChecks=\`${stats.blockHashChecks ?? 'n/a'}\`, retries=\`${stats.rateLimitRetries ?? 0}\`, splits=\`${stats.splits ?? 0}\``
            })

            const lines = [
              '<!-- m4-timelock-authority-audit -->',
              `M4 timelock authority audit run \`${context.runId}\``,
              `- event: \`${context.eventName}\``,
              `- audit step: \`${process.env.AUDIT_OUTCOME}\``,
              `- commit: \`${context.sha}\``,
              `- artifact: \`m4-timelock-authority-audit-${context.runId}\``,
              '',
              result
                ? `- role membership status: \`${result.roleMembershipStatus}\``
                : '- role membership status: `result-unavailable`',
              result ? `- control status: \`${result.controlStatus}\`` : '- control status: `unresolved`',
              result
                ? `- confirmed end block: \`${result.endBoundary.blockNumber}\` (agreement: \`${result.endBoundary.agreement}\`)`
                : '- confirmed end block: unavailable',
              result
                ? `- deployment block: \`${result.deploymentBoundary.blockNumber}\` (agreement: \`${result.deploymentBoundary.agreement}\`)`
                : '- deployment block: unavailable',
              result
                ? `- proxy identity agreement: \`${result.proxyIdentity.agreement}\``
                : '- proxy identity agreement: unavailable',
              result
                ? `- minimum delay seconds: \`${result.minimumDelaySeconds}\``
                : '- minimum delay seconds: unavailable',
              result ? `- open executor: \`${result.roles.openExecutor}\`` : '- open executor: unavailable',
              result
                ? `- role events: \`${result.roleHistory.eventCount}\`; digest: \`${result.roleHistory.digest}\``
                : '- role events: unavailable',
              result
                ? `- reconstruction anomalies: \`${result.roles.reconstruction.anomalies.length}\`; state mismatches: \`${result.roles.stateMismatches.length}\``
                : '- reconstruction checks: unavailable',
              '',
              'History sources:',
              ...(scanLines.length ? scanLines : ['- unavailable']),
              '',
              'Current role holders:',
              ...holderLines,
              '',
              'ProxyAdmin ownership chain:',
              ...chainLines,
              result
                ? `- terminal: \`${result.proxyAdminOwnership.terminalReason}\`; completed: \`${result.proxyAdminOwnership.completed}\``
                : '- terminal: unavailable',
              '',
              result
                ? `Authority boundaries: \`${JSON.stringify(result.authorityBoundaries)}\``
                : 'Authority boundaries: `unresolved`',
              '',
              'Execution eligibility remains `false`. Alchemy is mandatory for deployment archive and shared-block current-state agreement. Provider endpoints and credentials are omitted; no state-changing or transaction-capable operation was performed.',
            ]

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 89,
              body: lines.join('\n'),
            })
