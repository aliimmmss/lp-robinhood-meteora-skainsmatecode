name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  runner-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Verify hosted runner
        run: |
          echo "runner is executing"
          node --version
          npm --version

  verify:
    needs: runner-probe
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - if: matrix.check == 'format'
        run: npm run format:check
      - if: matrix.check == 'lint'
        run: npm run lint
      - if: matrix.check == 'typecheck'
        run: npm run typecheck
      - if: matrix.check == 'test'
        run: npm test
      - if: matrix.check == 'build'
        run: npm run build
