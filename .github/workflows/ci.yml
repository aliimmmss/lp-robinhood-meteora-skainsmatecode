name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - if: matrix.check == 'format'
        run: npm run format:check
      - if: matrix.check == 'lint'
        id: lint
        shell: bash
        run: |
          set +e
          npx eslint . > eslint-report.txt 2>&1
          status=$?
          cat eslint-report.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - if: matrix.check == 'lint'
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.txt
      - if: matrix.check == 'lint' && steps.lint.outputs.exit_code != '0'
        run: exit 1
      - if: matrix.check == 'typecheck'
        run: npm run typecheck
      - if: matrix.check == 'test'
        run: npm test
      - if: matrix.check == 'build'
        run: npm run build
