name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  diagnose-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Capture npm install
        id: install
        shell: bash
        run: |
          set +e
          npm install > npm-install.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: npm-install-log
          path: npm-install.log
      - name: Fail when install failed
        if: steps.install.outputs.exit_code != '0'
        run: exit 1

  verify:
    needs: diagnose-install
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - if: matrix.check == 'format'
        run: npm run format:check
      - if: matrix.check == 'lint'
        run: npm run lint
      - if: matrix.check == 'typecheck'
        run: npm run typecheck
      - if: matrix.check == 'test'
        run: npm test
      - if: matrix.check == 'build'
        run: npm run build
