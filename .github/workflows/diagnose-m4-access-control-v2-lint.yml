name: Diagnose M4 AccessControl audit v2 lint

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v2

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture exact ESLint diagnostic
        shell: bash
        run: |
          npx eslint .github/scripts/audit-weth-access-control.mjs --format json > .github/scripts/audit-weth-access-control.lint.json || true
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/scripts/audit-weth-access-control.lint.json
          git commit -m "chore: capture AccessControl lint diagnostic"
          git push origin HEAD:agent/m4-access-control-history-audit-v2
