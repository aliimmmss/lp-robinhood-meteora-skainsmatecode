name: Run M4 AccessControl audit v3 patcher

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v3b

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v3b
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Patch, format, and lint audit script
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/patch-weth-access-control-v3.py
          npm run format
          npm run lint
      - name: Commit final patched script
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/scripts/patch-weth-access-control-v3.py
          rm -f .github/scripts/.m4-v3-restore-trigger
          git add --all
          git commit -m "fix: throttle AccessControl log retrieval"
          git push origin HEAD:agent/m4-access-control-history-audit-v3b
