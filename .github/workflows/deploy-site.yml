name: Deploy monitoring site

on:
  workflow_dispatch:
  schedule:
    # Every 2 hours = ~360 builds/month, safely under Cloudflare Pages' free
    # limit of 500 builds/month. (Hourly would be ~720/month and exceed it.)
    - cron: '0 */2 * * *'

permissions:
  contents: read

concurrency:
  group: deploy-monitoring-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Absolute path: npm runs workspace scripts with cwd=apps/worker, so a
      # relative ./data would resolve under apps/worker and miss the cached DB.
      LP_MINE_DATABASE_PATH: ${{ github.workspace }}/data/robinhood-univ3.sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: mkdir -p data
      # Read-only consumer of the hourly monitor's accumulated database.
      # Restores the latest monitor cache but never saves it, so it cannot
      # conflict with the workflow that owns that cache.
      - name: Restore monitoring state (read-only)
        uses: actions/cache/restore@v4
        with:
          path: |
            data/robinhood-univ3.sqlite
            data/robinhood-univ3.sqlite-wal
            data/robinhood-univ3.sqlite-shm
          key: deploy-site-never-writes
          restore-keys: |
            monitor-db-${{ runner.os }}-
      - run: npm run build
      # site:data reads only the SQLite store (no live RPC needed).
      - name: Generate site data
        run: npm run --silent --workspace @lp-mine/worker site:data > web/src/data.json
      - name: Install and build site
        working-directory: web
        run: |
          npm ci
          npm run build
      # Idempotent: creates the Pages project on first run, harmlessly errors
      # (ignored) once it exists. Avoids a manual dashboard step.
      - name: Ensure Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create lp-mine-monitor --production-branch=main
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=lp-mine-monitor --branch=main --commit-dirty=true
