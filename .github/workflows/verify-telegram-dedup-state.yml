name: Verify Telegram dedup state

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

concurrency:
  group: telegram-monitor
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LP_MINE_DATABASE_PATH: ./data/robinhood-univ3.sqlite
      LP_MINE_EXPECTED_INTERVAL_SECONDS: '3600'
      LP_MINE_MAXIMUM_OBSERVATION_AGE_SECONDS: '5400'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore monitoring state
        id: restore-monitor-db
        uses: actions/cache/restore@v4
        with:
          path: |
            data/robinhood-univ3.sqlite
            data/robinhood-univ3.sqlite-wal
            data/robinhood-univ3.sqlite-shm
          key: monitor-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            monitor-db-${{ runner.os }}-
      - run: mkdir -p data
      - run: npm run build
      - name: Inspect persisted Telegram delivery state without sending
        id: inspect
        shell: bash
        run: |
          set -o pipefail
          node --input-type=module <<'NODE' | tee dedup-state-result.json
          import { statSync } from 'node:fs'
          import { SqliteMonitorAlertStateStore } from './apps/worker/dist/monitor-alert-state.js'
          import { readMonitorHealthConfig } from './apps/worker/dist/monitor-health-config.js'
          import { buildMonitorHealthReport } from './apps/worker/dist/monitor-health.js'

          const now = new Date()
          const config = readMonitorHealthConfig(process.env)
          const health = buildMonitorHealthReport(config, now)
          const store = new SqliteMonitorAlertStateStore(config.databasePath)
          try {
            store.reconcile(health.alerts, now)
            const active = store.list('active')
            const pending = store.listPendingNotificationAlerts('telegram')
            const result = {
              mode: 'read-only',
              generatedAt: now.toISOString(),
              databaseBytes: statSync(config.databasePath).size,
              healthStatus: health.status,
              activeAlertCount: active.length,
              pendingTelegramAlertCount: pending.length,
              pendingAlerts: pending.map((alert) => ({
                alertKey: alert.alertKey,
                occurrenceStartedAt: alert.occurrenceStartedAt.toISOString(),
              })),
              conclusion: pending.length === 0 ? 'deduplicated' : 'pending-deliveries',
              disclaimer: 'This diagnostic does not send Telegram messages, connect a wallet, sign transactions, or move funds.',
            }
            process.stdout.write(`${JSON.stringify(result, null, 2)}\n`)
          } finally {
            store.close()
          }
          NODE
      - name: Post temporary persisted-state verification marker
        if: always()
        uses: actions/github-script@v7
        env:
          INSPECT_OUTCOME: ${{ steps.inspect.outcome }}
          CACHE_HIT: ${{ steps.restore-monitor-db.outputs.cache-hit }}
        with:
          script: |
            const fs = require('fs')
            let result = null
            try {
              result = JSON.parse(fs.readFileSync('dedup-state-result.json', 'utf8'))
            } catch {}
            const body = [
              '<!-- telegram-dedup-state-verification -->',
              `Telegram persisted-state verification run \`${context.runId}\``,
              `- event: \`${context.eventName}\``,
              `- inspect step: \`${process.env.INSPECT_OUTCOME || 'unknown'}\``,
              `- exact cache hit: \`${process.env.CACHE_HIT || 'false'}\``,
              `- commit: \`${context.sha}\``,
              '',
              '```json',
              JSON.stringify(result, null, 2),
              '```',
              '',
              'Temporary read-only marker; no Telegram send, credentials, chat ID, wallet data, or signing authority.',
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 39,
              body,
            })
