name: M4 Static Review Document Bootstrap

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Export, format, and validate static review document
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path('packages/robinhood-univ3/src/weth-allowance-revocation-static-review-document.ts')
          source = source_path.read_text()
          marker = """function escapeHtml(value: string): string {
          """
          addition = """export function escapeWethAllowanceRevocationStaticReviewText(value: unknown): string | null {
            return typeof value === 'string' ? escapeHtml(value) : null
          }

          function escapeHtml(value: string): string {
          """
          if 'escapeWethAllowanceRevocationStaticReviewText' not in source:
              if marker not in source:
                  raise SystemExit('escape helper marker not found')
              source = source.replace(marker, addition, 1)
          source_path.write_text(source)

          index_path = Path('packages/robinhood-univ3/src/index.ts')
          index = index_path.read_text()
          export_marker = """export type {
            WethAllowanceRevocationFinalReviewSummary,
            WethAllowanceRevocationFinalReviewSummaryBody,
            WethAllowanceRevocationFinalReviewSummaryCheck,
            WethAllowanceRevocationFinalReviewSummaryInput,
            WethAllowanceRevocationFinalReviewSummaryLifecycleReference,
            WethAllowanceRevocationFinalReviewSummaryResult,
          } from './weth-allowance-revocation-final-review-summary.js'
          """
          export_addition = export_marker + """export {
            WETH_ALLOWANCE_REVOCATION_STATIC_REVIEW_CONTENT_TYPE,
            WETH_ALLOWANCE_REVOCATION_STATIC_REVIEW_CSP,
            WETH_ALLOWANCE_REVOCATION_STATIC_REVIEW_DOCUMENT_VERSION,
            WETH_ALLOWANCE_REVOCATION_STATIC_REVIEW_HEADERS,
            createWethAllowanceRevocationStaticReviewDocument,
            digestWethAllowanceRevocationStaticReviewDocumentMetadata,
            escapeWethAllowanceRevocationStaticReviewText,
          } from './weth-allowance-revocation-static-review-document.js'
          export type {
            WethAllowanceRevocationStaticReviewDocument,
            WethAllowanceRevocationStaticReviewDocumentCheck,
            WethAllowanceRevocationStaticReviewDocumentInput,
            WethAllowanceRevocationStaticReviewDocumentMetadata,
            WethAllowanceRevocationStaticReviewDocumentResult,
          } from './weth-allowance-revocation-static-review-document.js'
          """
          if 'createWethAllowanceRevocationStaticReviewDocument' not in index:
              if export_marker not in index:
                  raise SystemExit('final summary export marker not found')
              index = index.replace(export_marker, export_addition, 1)
          index_path.write_text(index)
          PY
          npx prettier --write \
            packages/robinhood-univ3/src/index.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-static-review-document.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-static-review-document.test.ts
          npm run lint
          npm run typecheck
          npm test
      - name: Commit validated source
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            packages/robinhood-univ3/src/index.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-static-review-document.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-static-review-document.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format and export static review document"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
