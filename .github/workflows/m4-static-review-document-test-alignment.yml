name: M4 Static Review Document Test Alignment

on:
  pull_request:
    branches: [agent/m4-static-review-document]

permissions:
  contents: write

jobs:
  align:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Align generated HTML assertion with production denylist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/robinhood-univ3/src/weth-allowance-revocation-static-review-document.test.ts')
          source = path.read_text()
          old = 'canvas|svg)(?:\\s|>)/i,'
          new = 'canvas|svg|base|area|details|summary|dialog|menu|fieldset|label|option|optgroup)(?:\\s|>)/i,'
          if new not in source:
              if old not in source:
                  raise SystemExit('element denylist assertion marker not found')
              source = source.replace(old, new, 1)
          path.write_text(source)
          PY
          npx prettier --write packages/robinhood-univ3/src/weth-allowance-revocation-static-review-document.test.ts
          npm run lint
          npm run typecheck
          npm test
      - name: Commit aligned assertion
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/robinhood-univ3/src/weth-allowance-revocation-static-review-document.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Align static review denylist assertion"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
