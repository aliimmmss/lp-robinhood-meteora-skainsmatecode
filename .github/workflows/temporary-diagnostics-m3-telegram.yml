name: Temporary M3 Telegram diagnostics

on:
  push:
    branches: [agent/m3-telegram-notifications]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m3-telegram-notifications
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format
      - name: Capture lint diagnostics
        run: npm run lint > lint-diagnostics.txt 2>&1 || true
      - name: Commit formatted files and diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: format Telegram notification slice"
          git push
